bookdown::gitbook:
  css: style.css
  split_bib: false
  config:
    toc:
      before: |
        <li><a href="./">Notas de Series de Tiempo</a></li>
      after: |
        <li><a href="https://github.com/benjov/Series-Tiempo" target="blank">Repositorio en GitHub</a></li>
    edit: https://github.com/benjov/Series-Tiempo/edit/main/%s
    download: ["pdf"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::bs4_book: default
